services:
  postgres:
    image: postgres:16-alpine
    container_name: nil_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nil_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nil_password}
      POSTGRES_DB: ${POSTGRES_DB:-next_in_line}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nil_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nil_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nextinline.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
